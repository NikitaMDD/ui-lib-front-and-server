services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    networks:
      - web-proj-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: backend-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/mydatabase?authSource=admin
      - PORT=3000
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - TEST_USER=${TEST_USER:-admin@example.com}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - web-proj-network
    volumes:
      - ./server:/app
      - /app/node_modules
      - /app/dist

  # Frontend (Vue.js)
  frontend:
    build:
      context: client
      dockerfile: Dockerfile
    container_name: frontend-app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - web-proj-network

networks:
  web-proj-network:
    driver: bridge

volumes:
  mongodb_data: