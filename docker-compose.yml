services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    networks:
      - web-proj-network

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: backend-server
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/mydatabase?authSource=admin
      - PORT=3000
    depends_on:
      - mongodb
    networks:
      - web-proj-network
    volumes:
      - ./server:/app
      - /app/node_modules

  # Frontend (Vue.js)
  frontend:
    build:
      context: client
      dockerfile: Dockerfile
    container_name: frontend-app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - web-proj-network

networks:
  web-proj-network:
    driver: bridge

volumes:
  mongodb_data: